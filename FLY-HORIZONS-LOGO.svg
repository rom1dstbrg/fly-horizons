<?xml version="1.0" encoding="UTF-8"?>
<!--
  FLY HORIZONS — Logo System
  ═══════════════════════════════════════════
  Toutes les variations officielles du logotype.
  Ouvrir dans Adobe Illustrator, Figma ou Inkscape.

  Polices requises : Poppins 900 (Google Fonts)
  Symbole : "Le Passage" — avion vue du dessus + arc horizon

  Artboards (groupes) :
    #A1 — Logo complet fond sombre  (primaire)
    #A2 — Logo complet fond clair   (secondaire)
    #A3 — Monochrome blanc sur navy
    #A4 — Monochrome navy sur blanc
    #A5 — Symbole seul (4 couleurs)
    #A6 — Wordmark seul (sans symbole)

  Couleurs de marque :
    Navy Dark : #0b2238
    Navy      : #113356
    Gold      : #F2B705
    Blanc     : #ffffff
  ═══════════════════════════════════════════
-->
<svg
  xmlns="http://www.w3.org/2000/svg"
  xmlns:xlink="http://www.w3.org/1999/xlink"
  viewBox="0 0 1440 960"
  width="1440"
  height="960"
>

  <!-- ═══ DÉFINITIONS ═══ -->
  <defs>
    <!-- Symbole : Le Passage (avion + horizon) -->
    <symbol id="mark" viewBox="0 0 60 68">
      <!-- Fuselage -->
      <path id="fuselage"
        d="M30 3C31.7 3 33 5 33 11L32.5 44C32.5 47 31.5 48.5 30 48.5C28.5 48.5 27.5 47 27.5 44L27 11C27 5 28.3 3 30 3Z"/>
      <!-- Ailes principales -->
      <path id="wings"
        d="M30 22L2 41L13 40L30 30L47 40L58 41Z"/>
      <!-- Dérives de queue -->
      <path id="tail"
        d="M27 44L16 57L30 52.5L44 57L33 44Z"/>
      <!-- Arc horizon -->
      <path id="horizon"
        d="M3 63Q30 53 57 63"
        fill="none" stroke-width="2.5" stroke-linecap="round"/>
    </symbol>

    <!-- Fond navy réutilisable -->
    <rect id="bg-navy" width="440" height="280" rx="16" fill="#0b2238"/>
    <rect id="bg-white" width="440" height="280" rx="16" fill="#ffffff"/>
    <rect id="bg-light" width="440" height="280" rx="16" fill="#f6f8fc"/>
  </defs>

  <!-- ═══════════════════════════════════════════════════════
       LIGNE 1 — LOGO COMPLET
  ═══════════════════════════════════════════════════════ -->

  <!-- ─── A1 : Logo complet — fond sombre (VERSION PRIMAIRE) ─── -->
  <g id="A1-logo-fond-sombre" transform="translate(40, 40)">
    <!-- Fond -->
    <rect width="440" height="280" rx="16" fill="#0b2238"/>
    <!-- Label -->
    <text x="220" y="26" font-family="'Poppins', sans-serif" font-size="9"
      font-weight="700" letter-spacing="2" text-anchor="middle"
      fill="rgba(255,255,255,0.2)" text-decoration="none">
      VERSION PRIMAIRE — FOND SOMBRE
    </text>
    <!-- Symbole -->
    <g transform="translate(142, 80)">
      <path d="M30 3C31.7 3 33 5 33 11L32.5 44C32.5 47 31.5 48.5 30 48.5C28.5 48.5 27.5 47 27.5 44L27 11C27 5 28.3 3 30 3Z" fill="#F2B705"/>
      <path d="M30 22L2 41L13 40L30 30L47 40L58 41Z" fill="#F2B705"/>
      <path d="M27 44L16 57L30 52.5L44 57L33 44Z" fill="#F2B705"/>
      <path d="M3 63Q30 53 57 63" stroke="#F2B705" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    </g>
    <!-- Wordmark -->
    <text x="220" y="178" font-family="'Poppins', Arial, sans-serif" font-size="32"
      font-weight="900" letter-spacing="-0.5" text-anchor="middle" fill="white">
      FLY <tspan fill="#F2B705">HORIZONS</tspan>
    </text>
    <!-- Tagline -->
    <text x="220" y="200" font-family="'Poppins', Arial, sans-serif" font-size="8"
      font-weight="600" letter-spacing="3" text-anchor="middle"
      fill="rgba(255,255,255,0.35)">
      VOLS EN PARTAGE DE COÛTS · CHARLEROI EBCI
    </text>
    <!-- Ligne gold décorative -->
    <line x1="170" y1="215" x2="270" y2="215" stroke="#F2B705" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  </g>

  <!-- ─── A2 : Logo complet — fond clair (VERSION SECONDAIRE) ─── -->
  <g id="A2-logo-fond-clair" transform="translate(520, 40)">
    <rect width="440" height="280" rx="16" fill="#ffffff" stroke="#e0e5ef" stroke-width="1"/>
    <text x="220" y="26" font-family="'Poppins', sans-serif" font-size="9"
      font-weight="700" letter-spacing="2" text-anchor="middle"
      fill="#94a3b8">
      VERSION SECONDAIRE — FOND CLAIR
    </text>
    <g transform="translate(142, 80)">
      <path d="M30 3C31.7 3 33 5 33 11L32.5 44C32.5 47 31.5 48.5 30 48.5C28.5 48.5 27.5 47 27.5 44L27 11C27 5 28.3 3 30 3Z" fill="#0b2238"/>
      <path d="M30 22L2 41L13 40L30 30L47 40L58 41Z" fill="#0b2238"/>
      <path d="M27 44L16 57L30 52.5L44 57L33 44Z" fill="#0b2238"/>
      <path d="M3 63Q30 53 57 63" stroke="#F2B705" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    </g>
    <text x="220" y="178" font-family="'Poppins', Arial, sans-serif" font-size="32"
      font-weight="900" letter-spacing="-0.5" text-anchor="middle" fill="#0b2238">
      FLY <tspan fill="#F2B705">HORIZONS</tspan>
    </text>
    <text x="220" y="200" font-family="'Poppins', Arial, sans-serif" font-size="8"
      font-weight="600" letter-spacing="3" text-anchor="middle" fill="#94a3b8">
      VOLS EN PARTAGE DE COÛTS · CHARLEROI EBCI
    </text>
    <line x1="170" y1="215" x2="270" y2="215" stroke="#F2B705" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- ─── A3 : Monochrome blanc ─── -->
  <g id="A3-monochrome-blanc" transform="translate(1000, 40)">
    <rect width="400" height="280" rx="16" fill="#0b2238"/>
    <text x="200" y="26" font-family="'Poppins', sans-serif" font-size="9"
      font-weight="700" letter-spacing="2" text-anchor="middle"
      fill="rgba(255,255,255,0.2)">
      MONOCHROME BLANC
    </text>
    <g transform="translate(122, 80)">
      <path d="M30 3C31.7 3 33 5 33 11L32.5 44C32.5 47 31.5 48.5 30 48.5C28.5 48.5 27.5 47 27.5 44L27 11C27 5 28.3 3 30 3Z" fill="white"/>
      <path d="M30 22L2 41L13 40L30 30L47 40L58 41Z" fill="white"/>
      <path d="M27 44L16 57L30 52.5L44 57L33 44Z" fill="white"/>
      <path d="M3 63Q30 53 57 63" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    </g>
    <text x="200" y="178" font-family="'Poppins', Arial, sans-serif" font-size="30"
      font-weight="900" letter-spacing="-0.5" text-anchor="middle" fill="white">
      FLY HORIZONS
    </text>
    <text x="200" y="200" font-family="'Poppins', Arial, sans-serif" font-size="8"
      font-weight="600" letter-spacing="3" text-anchor="middle"
      fill="rgba(255,255,255,0.3)">
      VOLS EN PARTAGE DE COÛTS · CHARLEROI EBCI
    </text>
  </g>

  <!-- ═══════════════════════════════════════════════════════
       LIGNE 2 — SYMBOLE SEUL + WORDMARK SEUL
  ═══════════════════════════════════════════════════════ -->

  <!-- ─── A4 : Monochrome navy sur fond clair ─── -->
  <g id="A4-monochrome-navy" transform="translate(40, 360)">
    <rect width="400" height="240" rx="16" fill="#f6f8fc" stroke="#e0e5ef" stroke-width="1"/>
    <text x="200" y="24" font-family="'Poppins', sans-serif" font-size="9"
      font-weight="700" letter-spacing="2" text-anchor="middle" fill="#94a3b8">
      MONOCHROME NAVY
    </text>
    <g transform="translate(122, 60)">
      <path d="M30 3C31.7 3 33 5 33 11L32.5 44C32.5 47 31.5 48.5 30 48.5C28.5 48.5 27.5 47 27.5 44L27 11C27 5 28.3 3 30 3Z" fill="#0b2238"/>
      <path d="M30 22L2 41L13 40L30 30L47 40L58 41Z" fill="#0b2238"/>
      <path d="M27 44L16 57L30 52.5L44 57L33 44Z" fill="#0b2238"/>
      <path d="M3 63Q30 53 57 63" stroke="#0b2238" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    </g>
    <text x="200" y="162" font-family="'Poppins', Arial, sans-serif" font-size="30"
      font-weight="900" letter-spacing="-0.5" text-anchor="middle" fill="#0b2238">
      FLY HORIZONS
    </text>
    <text x="200" y="184" font-family="'Poppins', Arial, sans-serif" font-size="8"
      font-weight="600" letter-spacing="3" text-anchor="middle" fill="#94a3b8">
      VOLS EN PARTAGE DE COÛTS · CHARLEROI EBCI
    </text>
  </g>

  <!-- ─── A5 : Symbole seul — 4 variations de couleur ─── -->
  <g id="A5-symbole-seul" transform="translate(480, 360)">
    <!-- Titre -->
    <text x="300" y="20" font-family="'Poppins', sans-serif" font-size="10"
      font-weight="700" letter-spacing="2" text-anchor="middle" fill="#64748b">
      SYMBOLE SEUL — 4 VARIANTES
    </text>

    <!-- Gold sur navy -->
    <rect x="0" y="35" width="130" height="130" rx="12" fill="#0b2238"/>
    <g transform="translate(35, 47)">
      <path d="M30 3C31.7 3 33 5 33 11L32.5 44C32.5 47 31.5 48.5 30 48.5C28.5 48.5 27.5 47 27.5 44L27 11C27 5 28.3 3 30 3Z" fill="#F2B705"/>
      <path d="M30 22L2 41L13 40L30 30L47 40L58 41Z" fill="#F2B705"/>
      <path d="M27 44L16 57L30 52.5L44 57L33 44Z" fill="#F2B705"/>
      <path d="M3 63Q30 53 57 63" stroke="#F2B705" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    </g>
    <text x="65" y="182" font-family="'Poppins', sans-serif" font-size="9"
      font-weight="600" text-anchor="middle" fill="#64748b">Gold / Navy</text>
    <text x="65" y="194" font-family="'DM Mono', monospace" font-size="8"
      text-anchor="middle" fill="#94a3b8">Primaire</text>

    <!-- Navy sur blanc -->
    <rect x="145" y="35" width="130" height="130" rx="12" fill="white" stroke="#e0e5ef" stroke-width="1"/>
    <g transform="translate(180, 47)">
      <path d="M30 3C31.7 3 33 5 33 11L32.5 44C32.5 47 31.5 48.5 30 48.5C28.5 48.5 27.5 47 27.5 44L27 11C27 5 28.3 3 30 3Z" fill="#0b2238"/>
      <path d="M30 22L2 41L13 40L30 30L47 40L58 41Z" fill="#0b2238"/>
      <path d="M27 44L16 57L30 52.5L44 57L33 44Z" fill="#0b2238"/>
      <path d="M3 63Q30 53 57 63" stroke="#F2B705" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    </g>
    <text x="210" y="182" font-family="'Poppins', sans-serif" font-size="9"
      font-weight="600" text-anchor="middle" fill="#64748b">Navy / White</text>
    <text x="210" y="194" font-family="'DM Mono', monospace" font-size="8"
      text-anchor="middle" fill="#94a3b8">Secondaire</text>

    <!-- Blanc sur navy -->
    <rect x="290" y="35" width="130" height="130" rx="12" fill="#0b2238"/>
    <g transform="translate(325, 47)">
      <path d="M30 3C31.7 3 33 5 33 11L32.5 44C32.5 47 31.5 48.5 30 48.5C28.5 48.5 27.5 47 27.5 44L27 11C27 5 28.3 3 30 3Z" fill="white"/>
      <path d="M30 22L2 41L13 40L30 30L47 40L58 41Z" fill="white"/>
      <path d="M27 44L16 57L30 52.5L44 57L33 44Z" fill="white"/>
      <path d="M3 63Q30 53 57 63" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    </g>
    <text x="355" y="182" font-family="'Poppins', sans-serif" font-size="9"
      font-weight="600" text-anchor="middle" fill="#64748b">Blanc pur</text>
    <text x="355" y="194" font-family="'DM Mono', monospace" font-size="8"
      text-anchor="middle" fill="#94a3b8">Mono blanc</text>

    <!-- Navy sur gris clair -->
    <rect x="435" y="35" width="130" height="130" rx="12" fill="#f6f8fc" stroke="#e0e5ef" stroke-width="1"/>
    <g transform="translate(470, 47)">
      <path d="M30 3C31.7 3 33 5 33 11L32.5 44C32.5 47 31.5 48.5 30 48.5C28.5 48.5 27.5 47 27.5 44L27 11C27 5 28.3 3 30 3Z" fill="#0b2238"/>
      <path d="M30 22L2 41L13 40L30 30L47 40L58 41Z" fill="#0b2238"/>
      <path d="M27 44L16 57L30 52.5L44 57L33 44Z" fill="#0b2238"/>
      <path d="M3 63Q30 53 57 63" stroke="#0b2238" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    </g>
    <text x="500" y="182" font-family="'Poppins', sans-serif" font-size="9"
      font-weight="600" text-anchor="middle" fill="#64748b">Navy mono</text>
    <text x="500" y="194" font-family="'DM Mono', monospace" font-size="8"
      text-anchor="middle" fill="#94a3b8">Mono navy</text>
  </g>

  <!-- ═══════════════════════════════════════════════════════
       LIGNE 3 — PALETTE DE COULEURS
  ═══════════════════════════════════════════════════════ -->
  <g id="palette" transform="translate(40, 680)">
    <text x="0" y="0" font-family="'Poppins', sans-serif" font-size="10"
      font-weight="700" letter-spacing="2" fill="#64748b">
      PALETTE DE COULEURS OFFICIELLE
    </text>

    <!-- Navy Dark -->
    <rect x="0" y="14" width="180" height="80" rx="10" fill="#0b2238"/>
    <text x="12" y="58" font-family="'Poppins', sans-serif" font-size="12" font-weight="700" fill="white">Navy Dark</text>
    <text x="12" y="74" font-family="'DM Mono', monospace" font-size="10" fill="rgba(255,255,255,0.45)">#0b2238</text>
    <text x="12" y="86" font-family="'DM Mono', monospace" font-size="9" fill="rgba(255,255,255,0.3)">RGB 11, 34, 56</text>

    <!-- Gold -->
    <rect x="196" y="14" width="180" height="80" rx="10" fill="#F2B705"/>
    <text x="208" y="58" font-family="'Poppins', sans-serif" font-size="12" font-weight="700" fill="#0b2238">Gold</text>
    <text x="208" y="74" font-family="'DM Mono', monospace" font-size="10" fill="rgba(11,34,56,0.55)">#F2B705</text>
    <text x="208" y="86" font-family="'DM Mono', monospace" font-size="9" fill="rgba(11,34,56,0.35)">RGB 242, 183, 5</text>

    <!-- Navy -->
    <rect x="392" y="14" width="180" height="80" rx="10" fill="#113356"/>
    <text x="404" y="58" font-family="'Poppins', sans-serif" font-size="12" font-weight="700" fill="white">Navy</text>
    <text x="404" y="74" font-family="'DM Mono', monospace" font-size="10" fill="rgba(255,255,255,0.45)">#113356</text>
    <text x="404" y="86" font-family="'DM Mono', monospace" font-size="9" fill="rgba(255,255,255,0.3)">RGB 17, 51, 86</text>

    <!-- White -->
    <rect x="588" y="14" width="180" height="80" rx="10" fill="white" stroke="#e0e5ef" stroke-width="1"/>
    <text x="600" y="58" font-family="'Poppins', sans-serif" font-size="12" font-weight="700" fill="#0b2238">White</text>
    <text x="600" y="74" font-family="'DM Mono', monospace" font-size="10" fill="#94a3b8">#ffffff</text>
    <text x="600" y="86" font-family="'DM Mono', monospace" font-size="9" fill="#94a3b8">RGB 255, 255, 255</text>

    <!-- BG -->
    <rect x="784" y="14" width="180" height="80" rx="10" fill="#f6f8fc" stroke="#e0e5ef" stroke-width="1"/>
    <text x="796" y="58" font-family="'Poppins', sans-serif" font-size="12" font-weight="700" fill="#0b2238">Background</text>
    <text x="796" y="74" font-family="'DM Mono', monospace" font-size="10" fill="#94a3b8">#f6f8fc</text>
    <text x="796" y="86" font-family="'DM Mono', monospace" font-size="9" fill="#94a3b8">Fond global</text>

    <!-- Border -->
    <rect x="980" y="14" width="180" height="80" rx="10" fill="#e0e5ef"/>
    <text x="992" y="58" font-family="'Poppins', sans-serif" font-size="12" font-weight="700" fill="#64748b">Border</text>
    <text x="992" y="74" font-family="'DM Mono', monospace" font-size="10" fill="#94a3b8">#e0e5ef</text>
    <text x="992" y="86" font-family="'DM Mono', monospace" font-size="9" fill="#94a3b8">Bordures cartes</text>
  </g>

  <!-- ═══════════════════════════════════════════════════════
       SIGNATURE
  ═══════════════════════════════════════════════════════ -->
  <g transform="translate(40, 910)">
    <text font-family="'Poppins', sans-serif" font-size="9" fill="#94a3b8">
      Fly Horizons — Logo System v2.0 — Mai 2026 — fly-horizons.com — DESTANBERG Romain
      · Police requise : Poppins 900 (fonts.google.com/specimen/Poppins)
    </text>
  </g>

</svg>
